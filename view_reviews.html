<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Reviews Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .file-upload {
            text-align: center;
            margin-bottom: 30px;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload label {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .file-upload label:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-header {
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .app-info h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .app-id {
            font-size: 0.85rem;
            color: #888;
            font-family: monospace;
        }

        .review-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .reviews-list {
            padding: 20px;
        }

        .review-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid;
            transition: transform 0.2s;
        }

        .review-item:hover {
            transform: translateX(5px);
        }

        .review-item.rating-1 {
            border-left-color: #ff4757;
        }

        .review-item.rating-2 {
            border-left-color: #ffa502;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .rating {
            display: flex;
            gap: 3px;
        }

        .star {
            font-size: 1.2rem;
        }

        .star.filled {
            color: #ffd700;
        }

        .star.empty {
            color: #444;
        }

        .review-meta {
            text-align: right;
            font-size: 0.85rem;
            color: #888;
        }

        .review-author {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 3px;
        }

        .review-date {
            font-size: 0.8rem;
        }

        .review-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .review-text {
            color: #ccc;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .review-text .more-link {
            color: #667eea;
            cursor: pointer;
            font-weight: 500;
        }

        .developer-response {
            margin-top: 15px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            border-left: 3px solid #667eea;
        }

        .developer-response-label {
            font-size: 0.8rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .developer-response-text {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .no-reviews {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .no-reviews-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toggle-collapsed {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #888;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .toggle-collapsed:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .collapsed .reviews-list {
            display: none;
        }

        .collapse-icon {
            transition: transform 0.3s;
        }

        .collapsed .collapse-icon {
            transform: rotate(-90deg);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .stats {
                gap: 20px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .app-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .review-header {
                flex-direction: column;
            }

            .review-meta {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>App Store Reviews</h1>
            <p class="subtitle">Negative Reviews Viewer (1-2 Stars)</p>
            <div class="stats" id="stats">
                <div class="stat">
                    <div class="stat-value" id="total-apps">0</div>
                    <div class="stat-label">Apps</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-reviews">0</div>
                    <div class="stat-label">Reviews</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="avg-rating">0</div>
                    <div class="stat-label">Avg Rating</div>
                </div>
            </div>
        </header>

        <div class="file-upload">
            <input type="file" id="file-input" accept=".json">
            <label for="file-input">📂 Load JSON File</label>
        </div>

        <div id="content">
            <div class="no-reviews">
                <div class="no-reviews-icon">📋</div>
                <p>Load a JSON file to view reviews</p>
            </div>
        </div>
    </div>

    <script>
        // Auto-load the most recent JSON file
        async function loadDefaultFile() {
            try {
                // Try to load the default JSON file
                const response = await fetch('reviews_20260303_191329.json');
                if (response.ok) {
                    const data = await response.json();
                    displayReviews(data);
                }
            } catch (e) {
                console.log('No default file found');
            }
        }

        // File input handler
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        displayReviews(data);
                    } catch (err) {
                        alert('Invalid JSON file');
                    }
                };
                reader.readAsText(file);
            }
        });

        function displayReviews(data) {
            const content = document.getElementById('content');

            // Calculate stats
            const totalApps = data.length;
            const totalReviews = data.reduce((sum, app) => sum + app.reviews.length, 0);
            const avgRating = totalReviews > 0
                ? (data.reduce((sum, app) =>
                    sum + app.reviews.reduce((s, r) => s + r.rating, 0), 0) / totalReviews).toFixed(1)
                : 0;

            document.getElementById('total-apps').textContent = totalApps;
            document.getElementById('total-reviews').textContent = totalReviews;
            document.getElementById('avg-rating').textContent = avgRating;

            if (totalReviews === 0) {
                content.innerHTML = `
                    <div class="no-reviews">
                        <div class="no-reviews-icon">📭</div>
                        <p>No reviews found in this file</p>
                    </div>
                `;
                return;
            }

            // Sort apps by review count (descending)
            data.sort((a, b) => b.reviews.length - a.reviews.length);

            let html = '';
            data.forEach((app, index) => {
                if (app.reviews.length === 0) return;

                html += `
                    <div class="app-card" id="app-${app.app_id}">
                        <div class="app-header">
                            <div class="app-info">
                                <h2>${escapeHtml(app.app_name)}</h2>
                                <span class="app-id">App ID: ${app.app_id}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <span class="review-count">${app.reviews.length} review${app.reviews.length !== 1 ? 's' : ''}</span>
                                <div class="toggle-collapsed" onclick="toggleApp('${app.app_id}')">
                                    <span class="collapse-icon">▼</span>
                                    <span>Toggle</span>
                                </div>
                            </div>
                        </div>
                        <div class="reviews-list">
                            ${app.reviews.map(review => renderReview(review)).join('')}
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        function renderReview(review) {
            const stars = renderStars(review.rating);
            const date = review.date ? new Date(review.date).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            }) : 'Unknown date';

            // Process review text
            let reviewText = escapeHtml(review.text || '');

            // Split by "more" and "Developer Response" if present
            const parts = reviewText.split(/more\s*(?=\n|$)/i);
            let mainText = parts[0].trim();
            let developerResponse = null;

            // Look for developer response
            const devResponseMatch = reviewText.match(/Developer Response\s*([\s\S]*?)(?:more\s*$|$)/i);
            if (devResponseMatch) {
                developerResponse = devResponseMatch[1].trim();
                mainText = parts[0].replace(/Developer Response[\s\S]*/i, '').trim();
            }

            // Remove author name from beginning if present
            const lines = mainText.split('\n');
            if (lines.length > 1 && lines[0].length < 50 && !lines[0].includes('.')) {
                // First line might be author name, skip it
                mainText = lines.slice(1).join('\n').trim();
            }

            return `
                <div class="review-item rating-${review.rating}">
                    <div class="review-header">
                        <div class="rating">${stars}</div>
                        <div class="review-meta">
                            <div class="review-author">${escapeHtml(review.author || 'Anonymous')}</div>
                            <div class="review-date">${date}</div>
                        </div>
                    </div>
                    ${review.title ? `<div class="review-title">${escapeHtml(review.title)}</div>` : ''}
                    <div class="review-text">${mainText}</div>
                    ${developerResponse ? `
                        <div class="developer-response">
                            <div class="developer-response-label">Developer Response</div>
                            <div class="developer-response-text">${developerResponse}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<span class="star filled">★</span>';
                } else {
                    stars += '<span class="star empty">☆</span>';
                }
            }
            return stars;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleApp(appId) {
            const card = document.getElementById(`app-${appId}`);
            card.classList.toggle('collapsed');
        }

        // Load default file on page load
        loadDefaultFile();
    </script>
</body>
</html>
