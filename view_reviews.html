<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Reviews Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
        }

        /* Left Sidebar */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .sidebar-header .subtitle {
            font-size: 0.8rem;
            color: #888;
        }

        .sidebar-stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .sidebar-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }

        .sidebar-stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
        }

        .sidebar-stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
        }

        .search-box {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box input:focus {
            border-color: #667eea;
        }

        .file-upload {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload label {
            display: block;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .file-upload label:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .app-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .app-list::-webkit-scrollbar {
            width: 6px;
        }

        .app-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .app-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .app-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .app-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .app-item.active {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .app-item-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #888;
        }

        .app-item-count {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .app-item.active .app-item-count {
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }

        /* Right Content Panel */
        .content-panel {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 30px;
        }

        .content-panel::-webkit-scrollbar {
            width: 8px;
        }

        .content-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .content-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .app-detail-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-detail-header h2 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .app-detail-meta {
            display: flex;
            gap: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .app-detail-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .review-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .reviews-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        .review-card:hover {
            transform: translateX(5px);
        }

        .review-card.rating-1 {
            border-left-color: #ff4757;
        }

        .review-card.rating-2 {
            border-left-color: #ffa502;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .rating {
            display: flex;
            gap: 3px;
        }

        .star {
            font-size: 1.2rem;
        }

        .star.filled {
            color: #ffd700;
        }

        .star.empty {
            color: #444;
        }

        .review-meta {
            text-align: right;
            font-size: 0.85rem;
            color: #888;
        }

        .review-author {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 3px;
        }

        .review-date {
            font-size: 0.8rem;
        }

        .review-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }

        .review-text {
            color: #ccc;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .developer-response {
            margin-top: 20px;
            padding: 15px 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            border-left: 3px solid #667eea;
        }

        .developer-response-label {
            font-size: 0.75rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .developer-response-text {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
        }

        .no-selection-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-selection-text {
            font-size: 1.2rem;
        }

        .no-reviews {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .no-reviews-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                height: auto;
                max-height: 40vh;
                position: relative;
            }

            .app-list {
                max-height: 200px;
            }

            .content-panel {
                height: auto;
                min-height: 60vh;
                padding: 20px;
            }

            .app-detail-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Left Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>App Store Reviews</h1>
            <p class="subtitle">Negative Reviews (1-2 Stars)</p>
            <div class="sidebar-stats">
                <div class="sidebar-stat">
                    <div class="sidebar-stat-value" id="total-apps">0</div>
                    <div class="sidebar-stat-label">Apps</div>
                </div>
                <div class="sidebar-stat">
                    <div class="sidebar-stat-value" id="total-reviews">0</div>
                    <div class="sidebar-stat-label">Reviews</div>
                </div>
            </div>
        </div>

        <div class="file-upload">
            <input type="file" id="file-input" accept=".json">
            <label for="file-input">Load JSON File</label>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search apps...">
        </div>

        <div class="app-list" id="app-list">
            <!-- App items will be rendered here -->
        </div>
    </div>

    <!-- Right Content Panel -->
    <div class="content-panel">
        <div id="content-area">
            <div class="no-selection">
                <div class="no-selection-icon">📱</div>
                <p class="no-selection-text">Select an app from the sidebar to view reviews</p>
            </div>
        </div>
    </div>

    <script>
        let appsData = [];
        let selectedAppId = null;

        // Auto-load the default JSON file
        async function loadDefaultFile() {
            try {
                const response = await fetch('reviews_20260303_191329.json');
                if (response.ok) {
                    const data = await response.json();
                    processData(data);
                }
            } catch (e) {
                console.log('No default file found');
            }
        }

        // File input handler
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        processData(data);
                    } catch (err) {
                        alert('Invalid JSON file');
                    }
                };
                reader.readAsText(file);
            }
        });

        // Search handler
        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            renderAppList(query);
        });

        function processData(data) {
            // Sort apps by review count (descending)
            appsData = data.sort((a, b) => b.reviews.length - a.reviews.length);

            // Update stats
            const totalApps = appsData.length;
            const totalReviews = appsData.reduce((sum, app) => sum + app.reviews.length, 0);

            document.getElementById('total-apps').textContent = totalApps;
            document.getElementById('total-reviews').textContent = totalReviews;

            // Render app list
            renderAppList();

            // Auto-select first app if available
            if (appsData.length > 0 && appsData[0].reviews.length > 0) {
                selectApp(appsData[0].app_id);
            }
        }

        function renderAppList(searchQuery = '') {
            const appList = document.getElementById('app-list');
            const filteredApps = searchQuery
                ? appsData.filter(app => app.app_name.toLowerCase().includes(searchQuery))
                : appsData;

            if (filteredApps.length === 0) {
                appList.innerHTML = `
                    <div class="no-reviews">
                        <p>No apps found</p>
                    </div>
                `;
                return;
            }

            appList.innerHTML = filteredApps.map(app => `
                <div class="app-item ${selectedAppId === app.app_id ? 'active' : ''}"
                     onclick="selectApp('${app.app_id}')">
                    <div class="app-item-name">${escapeHtml(app.app_name)}</div>
                    <div class="app-item-meta">
                        <span>ID: ${app.app_id}</span>
                        <span class="app-item-count">${app.reviews.length} reviews</span>
                    </div>
                </div>
            `).join('');
        }

        function selectApp(appId) {
            selectedAppId = appId;
            const app = appsData.find(a => a.app_id === appId);

            if (!app) return;

            // Update active state in sidebar
            renderAppList(document.getElementById('search-input').value);

            // Render app reviews
            renderAppReviews(app);
        }

        function renderAppReviews(app) {
            const contentArea = document.getElementById('content-area');

            if (!app || app.reviews.length === 0) {
                contentArea.innerHTML = `
                    <div class="no-reviews">
                        <div class="no-reviews-icon">📭</div>
                        <p>No negative reviews found for this app</p>
                    </div>
                `;
                return;
            }

            const avgRating = app.reviews.length > 0
                ? (app.reviews.reduce((sum, r) => sum + r.rating, 0) / app.reviews.length).toFixed(1)
                : 0;

            contentArea.innerHTML = `
                <div class="app-detail-header">
                    <h2>${escapeHtml(app.app_name)}</h2>
                    <div class="app-detail-meta">
                        <span>App ID: ${app.app_id}</span>
                        <span class="review-badge">${app.reviews.length} negative reviews</span>
                        <span>Avg: ${avgRating} stars</span>
                    </div>
                </div>
                <div class="reviews-container">
                    ${app.reviews.map(review => renderReview(review)).join('')}
                </div>
            `;
        }

        function renderReview(review) {
            const stars = renderStars(review.rating);
            const date = review.date ? new Date(review.date).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            }) : 'Unknown date';

            let reviewText = escapeHtml(review.text || '');

            // Look for developer response
            const devResponseMatch = reviewText.match(/Developer Response\s*([\s\S]*?)(?:more\s*$|$)/i);
            let mainText = reviewText;
            let developerResponse = null;

            if (devResponseMatch) {
                developerResponse = devResponseMatch[1].trim();
                mainText = reviewText.replace(/Developer Response[\s\S]*/i, '').trim();
            }

            // Remove trailing "more" if present
            mainText = mainText.replace(/\s*more\s*$/i, '').trim();

            return `
                <div class="review-card rating-${review.rating}">
                    <div class="review-header">
                        <div class="rating">${stars}</div>
                        <div class="review-meta">
                            <div class="review-author">${escapeHtml(review.author || 'Anonymous')}</div>
                            <div class="review-date">${date}</div>
                        </div>
                    </div>
                    ${review.title ? `<div class="review-title">${escapeHtml(review.title)}</div>` : ''}
                    <div class="review-text">${mainText}</div>
                    ${developerResponse ? `
                        <div class="developer-response">
                            <div class="developer-response-label">Developer Response</div>
                            <div class="developer-response-text">${developerResponse}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<span class="star filled">★</span>';
                } else {
                    stars += '<span class="star empty">☆</span>';
                }
            }
            return stars;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load default file on page load
        loadDefaultFile();
    </script>
</body>
</html>
